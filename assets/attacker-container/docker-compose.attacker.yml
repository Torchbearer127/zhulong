services:
  attacker:
    build:
      context: ./attacker-container
      labels:
        org.zhulong.managed: "true"
        org.zhulong.workspace: ${ZHULONG_WORKSPACE_LABEL:-unlabeled}
    labels:
      org.zhulong.managed: "true"
      org.zhulong.workspace: ${ZHULONG_WORKSPACE_LABEL:-unlabeled}
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ../poc:/workspace/poc
      - ../evidence:/workspace/evidence
    networks:
      - targetnet
    command: ["bash"]

networks:
  targetnet:
    external: true
    name: ${TARGET_NETWORK:-target_default}
